<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aura Clock</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #fce8f0; }

  #heart-layer {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    filter: blur(40px) saturate(1.1);
    z-index: 1;
  }
  #grain-layer {
    position: fixed; top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 2;
    pointer-events: none;
  }
  #time-wrap {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    z-index: 3;
    display: flex;
    align-items: flex-end;
    gap: 14px;
    pointer-events: none;
  }
  #time-display {
    font-size: 13vw;
    color: #ffffff;
    letter-spacing: 0.06em;
    font-family: sans-serif;
    line-height: 1;
    text-shadow: 0 2px 40px rgba(180,20,90,0.25);
  }
  #ampm {
    font-family: sans-serif;
    font-size: 3vw;
    color: rgba(255,255,255,0.85);
    letter-spacing: 0.1em;
    padding-bottom: 1.4vw;
    text-shadow: 0 2px 20px rgba(180,20,90,0.2);
  }
</style>
</head>
<body>

<canvas id="heart-layer"></canvas>
<canvas id="grain-layer"></canvas>
<div id="time-wrap">
  <div id="time-display">𝟏𝟐:𝟎𝟎</div>
  <div id="ampm">AM</div>
</div>

<script>
  const hCanvas = document.getElementById('heart-layer');
  const hCtx = hCanvas.getContext('2d');
  const gCanvas = document.getElementById('grain-layer');
  const gCtx = gCanvas.getContext('2d');
  const timeEl = document.getElementById('time-display');
  const ampmEl = document.getElementById('ampm');

  const boldDigits = ['𝟎','𝟏','𝟐','𝟑','𝟒','𝟓','𝟔','𝟕','𝟖','𝟗'];
  function toBold(str) {
    return str.split('').map(c => c >= '0' && c <= '9' ? boldDigits[+c] : c).join('');
  }

  let W, H, cx, cy;

  function heartPath(ctx, x, y, s) {
    ctx.beginPath();
    ctx.moveTo(x, y + s * 0.3);
    ctx.bezierCurveTo(x,           y - s*0.05, x - s*0.55, y - s*0.05, x - s*0.55, y + s*0.28);
    ctx.bezierCurveTo(x - s*0.55,  y + s*0.65, x,           y + s*0.95, x,           y + s*1.15);
    ctx.bezierCurveTo(x,           y + s*0.95, x + s*0.55,  y + s*0.65, x + s*0.55,  y + s*0.28);
    ctx.bezierCurveTo(x + s*0.55,  y - s*0.05, x,           y - s*0.05, x,           y + s*0.3);
    ctx.closePath();
  }

  function drawHeart() {
    hCtx.clearRect(0, 0, W, H);
    hCtx.fillStyle = '#fce8f0';
    hCtx.fillRect(0, 0, W, H);
    const hy = cy;
    const s = Math.min(W, H) * 0.38;
    const layers = [
      { scale: 2.6,  r:255, g:200, b:225, a:0.5  },
      { scale: 2.1,  r:255, g:160, b:200, a:0.6  },
      { scale: 1.7,  r:255, g:100, b:165, a:0.72 },
      { scale: 1.35, r:248, g: 50, b:140, a:0.82 },
      { scale: 1.05, r:230, g: 15, b:115, a:0.92 },
      { scale: 0.78, r:205, g:  5, b:100, a:1.0  },
    ];
    layers.forEach(({ scale, r, g, b, a }) => {
      hCtx.save();
      hCtx.translate(cx, hy);
      hCtx.scale(scale, scale);
      hCtx.translate(-cx, -hy);
      heartPath(hCtx, cx, hy - s * 0.55, s);
      hCtx.fillStyle = `rgba(${r},${g},${b},${a})`;
      hCtx.fill();
      hCtx.restore();
    });
  }

  function drawGrainOnce() {
    const id = gCtx.createImageData(W, H);
    const d = id.data;
    for (let i = 0; i < d.length; i += 4) {
      const v = Math.floor(Math.random() * 255);
      d[i] = d[i+1] = d[i+2] = v;
      d[i+3] = 28;
    }
    gCtx.putImageData(id, 0, 0);
  }

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    hCanvas.width = W; hCanvas.height = H;
    gCanvas.width = W; gCanvas.height = H;
    cx = W / 2; cy = H / 2;
    drawHeart();
    drawGrainOnce();
  }

  function updateTime() {
    const now = new Date();
    const rawH = now.getHours();
    let h = rawH % 12;
    if (h === 0) h = 12;
    const m = String(now.getMinutes()).padStart(2, '0');
    timeEl.textContent = toBold(String(h)) + ':' + toBold(m);
    ampmEl.textContent = rawH < 12 ? 'AM' : 'PM';
  }

  function frame() { updateTime(); requestAnimationFrame(frame); }

  resize();
  window.addEventListener('resize', resize);
  requestAnimationFrame(frame);
</script>
</body>
</html>
