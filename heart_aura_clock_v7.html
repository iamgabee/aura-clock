
<style>
  #wrap {
    width: 100%;
    aspect-ratio: 16/9;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: #fce8f0;
  }
  #heart-layer {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    filter: blur(32px) saturate(1.1);
  }
  #grain-layer {
    position: absolute; top: 0; left: 0;
    width: 100%; height: 100%;
    opacity: 0.45;
    mix-blend-mode: overlay;
    image-rendering: pixelated;
  }
  #time-wrap {
    position: relative;
    z-index: 10;
    pointer-events: none;
    display: flex;
    align-items: flex-end;
    gap: clamp(6px, 1.2vw, 14px);
  }
  #time-display {
    font-size: clamp(72px, 16vw, 148px);
    color: #ffffff;
    letter-spacing: 0.06em;
    text-shadow: 0 2px 40px rgba(180,20,90,0.25);
    font-family: sans-serif;
    line-height: 1;
  }
  #ampm {
    font-family: sans-serif;
    font-size: clamp(18px, 3.2vw, 36px);
    color: rgba(255,255,255,0.8);
    letter-spacing: 0.12em;
    padding-bottom: clamp(8px, 1.6vw, 18px);
    text-shadow: 0 2px 20px rgba(180,20,90,0.2);
  }
</style>

<div id="wrap">
  <canvas id="heart-layer"></canvas>
  <canvas id="grain-layer"></canvas>
  <div id="time-wrap">
    <div id="time-display">𝟏𝟐:𝟎𝟎</div>
    <div id="ampm">AM</div>
  </div>
</div>

<script>
const wrap = document.getElementById('wrap');
const hCanvas = document.getElementById('heart-layer');
const hCtx = hCanvas.getContext('2d');
const gCanvas = document.getElementById('grain-layer');
const gCtx = gCanvas.getContext('2d');
const timeEl = document.getElementById('time-display');
const ampmEl = document.getElementById('ampm');

const boldDigits = ['𝟎','𝟏','𝟐','𝟑','𝟒','𝟓','𝟔','𝟕','𝟖','𝟗'];
function toBold(str) {
  return str.split('').map(c => c >= '0' && c <= '9' ? boldDigits[+c] : c).join('');
}

let W, H, cx, cy;

function heartPath(ctx, x, y, s) {
  ctx.beginPath();
  ctx.moveTo(x, y + s * 0.3);
  ctx.bezierCurveTo(x,          y - s*0.05, x - s*0.55, y - s*0.05, x - s*0.55, y + s*0.28);
  ctx.bezierCurveTo(x - s*0.55, y + s*0.65, x,          y + s*0.95, x,          y + s*1.15);
  ctx.bezierCurveTo(x,          y + s*0.95, x + s*0.55, y + s*0.65, x + s*0.55, y + s*0.28);
  ctx.bezierCurveTo(x + s*0.55, y - s*0.05, x,          y - s*0.05, x,          y + s*0.3);
  ctx.closePath();
}

function drawHeart() {
  hCtx.clearRect(0, 0, W, H);
  hCtx.fillStyle = '#fce8f0';
  hCtx.fillRect(0, 0, W, H);
  const hy = cy;
  const s = Math.min(W, H) * 0.31;
  const layers = [
    { scale: 2.6,  r:255, g:200, b:225, a:0.5  },
    { scale: 2.1,  r:255, g:160, b:200, a:0.6  },
    { scale: 1.7,  r:255, g:100, b:165, a:0.72 },
    { scale: 1.35, r:248, g: 50, b:140, a:0.82 },
    { scale: 1.05, r:230, g: 15, b:115, a:0.92 },
    { scale: 0.78, r:205, g:  5, b:100, a:1.0  },
  ];
  layers.forEach(({ scale, r, g, b, a }) => {
    hCtx.save();
    hCtx.translate(cx, hy);
    hCtx.scale(scale, scale);
    hCtx.translate(-cx, -hy);
    heartPath(hCtx, cx, hy - s * 0.55, s);
    hCtx.fillStyle = `rgba(${r},${g},${b},${a})`;
    hCtx.fill();
    hCtx.restore();
  });
}

function drawGrainOnce() {
  const id = gCtx.createImageData(gCanvas.width, gCanvas.height);
  const d = id.data;
  for (let i = 0; i < d.length; i += 4) {
    const v = Math.random() * 255;
    d[i] = d[i+1] = d[i+2] = v;
    d[i+3] = 255;
  }
  gCtx.putImageData(id, 0, 0);
}

function resize() {
  W = wrap.offsetWidth;
  H = wrap.offsetHeight;
  const dpr = devicePixelRatio;
  hCanvas.width = W * dpr; hCanvas.height = H * dpr;
  hCtx.setTransform(1,0,0,1,0,0);
  hCtx.scale(dpr, dpr);
  gCanvas.width = W * dpr; gCanvas.height = H * dpr;
  cx = W / 2; cy = H / 2;
  drawHeart();
  drawGrainOnce();
}

function updateTime() {
  const now = new Date();
  const rawH = now.getHours();
  let h = rawH % 12;
  if (h === 0) h = 12;
  const m = String(now.getMinutes()).padStart(2, '0');
  timeEl.textContent = toBold(String(h)) + ':' + toBold(m);
  ampmEl.textContent = rawH < 12 ? 'AM' : 'PM';
}

function frame() {
  updateTime();
  requestAnimationFrame(frame);
}

resize();
window.addEventListener('resize', resize);
requestAnimationFrame(frame);
</script>
